# AppVeyor CI — builds the Windows Tauri GUI installer and uploads it to the
# GitHub release whenever a vX.Y.Z tag is pushed.
#
# Setup (one-time):
#   1. https://ci.appveyor.com/ → Log in with GitHub → New Project → pick Chidi09/crush
#   2. Settings → Environment → add secret: GITHUB_TOKEN (a classic PAT with repo scope)
#   3. Push a tag — AppVeyor picks it up automatically.

# Only build on vX.Y.Z tags — skip all branch/PR pushes.
skip_non_tags: true

image: Visual Studio 2022

environment:
  # Set GITHUB_TOKEN in AppVeyor project Settings → Environment (lock icon = secure).
  GITHUB_TOKEN: $(GITHUB_TOKEN)

cache:
  - C:\Users\appveyor\.cargo\registry -> Cargo.lock
  - C:\Users\appveyor\AppData\Local\pnpm\store -> crates\crush-gui\pnpm-lock.yaml

install:
  # Rust — VS 2022 image doesn't put rustup/cargo on PATH; install explicitly.
  - appveyor DownloadFile https://win.rustup.rs/x86_64 -FileName rustup-init.exe
  - rustup-init.exe -y --default-toolchain stable-x86_64-pc-windows-msvc --no-modify-path
  - set PATH=%USERPROFILE%\.cargo\bin;%PATH%
  - rustup show

  # Node + pnpm
  - node --version
  - npm install -g pnpm@latest
  - pnpm --version

build_script:
  - cd crates\crush-gui
  - set CI=true
  - pnpm install
  - pnpm tauri build
  - cd ..\..

after_build:
  - ps: |
      $tag = $env:APPVEYOR_REPO_TAG_NAME

      $searchPaths = @(
        "crates\crush-gui\src-tauri\target\release\bundle\msi",
        "crates\crush-gui\src-tauri\target\release\bundle\nsis",
        "target\release\bundle\msi",
        "target\release\bundle\nsis"
      )

      $files = $searchPaths | Where-Object { Test-Path $_ } | ForEach-Object {
        Get-ChildItem $_ -Include *.msi,*.exe -Recurse -ErrorAction SilentlyContinue
      }

      if (-not $files) { Write-Host "No installer artifacts found — build may have failed"; exit 1 }

      $headers = @{ Authorization = "token $env:GITHUB_TOKEN"; "User-Agent" = "appveyor-crush" }

      # Find the release by tag, INCLUDING drafts. The /releases/tags/{tag} endpoint
      # returns 404 for draft releases (and races a not-yet-published CI release),
      # so list releases and match tag_name instead — works whether draft or public.
      $all = Invoke-RestMethod "https://api.github.com/repos/Chidi09/crush/releases?per_page=100" -Headers $headers
      $rel = $all | Where-Object { $_.tag_name -eq $tag } | Select-Object -First 1
      if (-not $rel) { Write-Host "No GitHub release found for tag $tag (draft or published) — aborting upload"; exit 1 }
      Write-Host "Found release $($rel.tag_name) (id=$($rel.id), draft=$($rel.draft))"
      foreach ($f in $files) {
        Write-Host "Uploading $($f.Name)..."
        $up = "https://uploads.github.com/repos/Chidi09/crush/releases/$($rel.id)/assets?name=$($f.Name)"
        try {
          Invoke-RestMethod -Uri $up -Method Post -Headers $headers `
            -ContentType "application/octet-stream" -InFile $f.FullName
          Write-Host "  uploaded OK"
        } catch {
          Write-Host "  upload failed: $_"
        }
      }

artifacts:
  - path: crates\crush-gui\src-tauri\target\release\bundle\**\*.msi
  - path: crates\crush-gui\src-tauri\target\release\bundle\**\*.exe
    name: InstallerNSIS
