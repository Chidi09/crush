# AppVeyor CI — builds the Windows Tauri GUI installer and uploads it to the
# GitHub release whenever a vX.Y.Z tag is pushed.
#
# Setup (one-time):
#   1. https://ci.appveyor.com/ → Log in with GitHub → New Project → pick Chidi09/crush
#   2. Settings → Environment → add secret: GITHUB_TOKEN (a classic PAT with repo scope)
#   3. Push a tag — AppVeyor picks it up automatically.

# Only run on version tags; skip regular branch pushes.
branches:
  only:
    - /^v\d+\.\d+\.\d+.*$/

skip_non_tags: true

image: Visual Studio 2022

environment:
  GITHUB_TOKEN:
    secure: YOUR_ENCRYPTED_TOKEN_HERE   # encrypt at: https://ci.appveyor.com/tools/encrypt

cache:
  - C:\Users\appveyor\.cargo\registry
  - target -> Cargo.lock

install:
  # Rust (MSVC toolchain)
  - rustup default stable-x86_64-pc-windows-msvc
  - rustup show

  # Node + pnpm
  - node --version
  - npm install -g pnpm@latest
  - pnpm --version

  # Tauri CLI
  - cargo install tauri-cli --locked 2>/dev/null || true

build_script:
  - cd crates\crush-gui
  - set CI=true
  - pnpm install
  - pnpm tauri build
  - cd ..\..

after_build:
  - ps: |
      $tag     = $env:APPVEYOR_REPO_TAG_NAME
      $version = $tag.TrimStart("v")
      $bundles = @(
        "target\release\bundle\msi",
        "target\release\bundle\nsis",
        "crates\crush-gui\src-tauri\target\release\bundle\msi",
        "crates\crush-gui\src-tauri\target\release\bundle\nsis"
      ) | Where-Object { Test-Path $_ }

      $files = $bundles | ForEach-Object {
        Get-ChildItem $_ -Include *.msi,*.exe -Recurse -ErrorAction SilentlyContinue
      }

      if (-not $files) { Write-Host "No installer artifacts found"; exit 1 }

      $headers = @{ Authorization = "token $env:GITHUB_TOKEN"; "User-Agent" = "appveyor" }

      foreach ($f in $files) {
        Write-Host "Uploading $($f.Name)..."
        $uploadUrl = "https://uploads.github.com/repos/Chidi09/crush/releases"
        # Get release ID for this tag
        $rel = Invoke-RestMethod "https://api.github.com/repos/Chidi09/crush/releases/tags/$tag" -Headers $headers
        $up  = "https://uploads.github.com/repos/Chidi09/crush/releases/$($rel.id)/assets?name=$($f.Name)"
        try {
          Invoke-RestMethod -Uri $up -Method Post -Headers $headers `
            -ContentType "application/octet-stream" -InFile $f.FullName
          Write-Host "  uploaded $($f.Name)"
        } catch {
          Write-Host "  failed: $_"
        }
      }

artifacts:
  - path: target\release\bundle\**\*.msi
  - path: target\release\bundle\**\*.exe
    name: InstallerNSIS

