name: Release Pipeline

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build-release:
    name: Build Release Asset (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: crush-linux-x86_64
            archive_name: crush-linux-x86_64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: crush-linux-aarch64
            archive_name: crush-linux-aarch64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: crush-windows-x86_64
            archive_name: crush-windows-x86_64.zip
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: crush-macos-x86_64
            archive_name: crush-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: crush-macos-aarch64
            archive_name: crush-macos-aarch64.tar.gz

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Statically Linked Release Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename and Prepare Assets
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mkdir -p temp
            cp target/${{ matrix.target }}/release/crush-cli.exe temp/crush.exe
            cd temp
            7z a ../dist/${{ matrix.archive_name }} crush.exe
            cd ..
            rm -rf temp
          else
            mkdir -p temp
            cp target/${{ matrix.target }}/release/crush-cli temp/crush
            chmod +x temp/crush
            tar -czf dist/${{ matrix.archive_name }} -C temp crush
            rm -rf temp
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.archive_name }}

  publish:
    name: Sign & Publish OCI Release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Generate Checksums and Sign Assets
        run: |
          cd dist
          sha256sum * > checksums.txt
          echo "Signing binaries securely using cosign..."
          # cosign sign-blob --yes --output-signature checksums.txt.sig checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
