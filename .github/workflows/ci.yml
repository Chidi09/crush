name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace
        # No --all-features: the `ebpf` feature needs nightly + bpf-linker
        # and crush-ebpf-progs is unbuildable until ported to aya-ebpf.
        run: cargo check --workspace --all-targets
      - name: Run tests
        run: cargo test --workspace --lib --exclude crush-ebpf-progs

  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace
        run: cargo check --workspace --exclude crush-runtime-linux --exclude crush-ebpf-progs
      - name: Run tests
        run: cargo test --workspace --exclude crush-runtime-linux --exclude crush-ebpf-progs

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace
        run: cargo check --workspace --exclude crush-runtime-linux --exclude crush-ebpf-progs
      - name: Run tests
        run: cargo test --workspace --exclude crush-runtime-linux --exclude crush-ebpf-progs

  test-wasm:
    name: Test (WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasi
      - uses: Swatinem/rust-cache@v2
      - name: Check WASM target
        run: cargo check -p crush-runtime-wasm --target wasm32-wasi

  test-arm:
    name: Test (ARM64 cross-compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compile tools
        run: sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Cross-check ARM64
        run: cargo check -p crush-cli --target aarch64-unknown-linux-gnu

  deny:
    name: cargo-deny (license + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: check

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --exclude crush-ebpf-progs -- -D warnings
