name: CI Matrix

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test-and-build:
    name: Build & Test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use-cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            use-cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use-cross: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cargo Cache Setup
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Install cross-rs
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Execute Tests (Native)
        if: "!matrix.use-cross"
        run: cargo test --workspace --all-features --no-fail-fast

      - name: Execute Tests (Cross via cross-rs)
        if: matrix.use-cross
        run: cross test --target ${{ matrix.target }} --workspace --no-fail-fast

      - name: Compile Release binaries
        if: "!matrix.use-cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Compile Release binaries (Cross via cross-rs)
        if: matrix.use-cross
        run: cross build --release --target ${{ matrix.target }}

  coverage:
    name: Code Coverage Gate (tarpaulin)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run Coverage Report
        run: |
          cargo tarpaulin --verbose --all-features --workspace --timeout 120 --out xml --fail-under 80
